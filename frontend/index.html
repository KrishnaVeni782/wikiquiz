<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiQuiz — AI-Powered Quiz Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #0b0e14;
      --surface:     #12161f;
      --surface2:    #1a2030;
      --border:      #232b3a;
      --accent:      #4ade80;       /* lime-green */
      --accent2:     #60a5fa;       /* sky-blue   */
      --danger:      #f87171;
      --text:        #e8edf5;
      --muted:       #6b7a9a;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --radius:       12px;
      --radius-sm:    8px;
      --transition:   0.22s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
    }
    .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
    header {
      padding: 48px 0 32px;
      display: flex; align-items: flex-end; gap: 16px;
    }
    .logo-mark {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-family: var(--font-display); font-weight: 800; font-size: 22px;
      color: var(--bg);
    }
    .header-text h1 {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text) 60%, var(--muted));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-text p { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .tabs {
      display: flex; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 10px 16px; border: none; cursor: pointer;
      border-radius: calc(var(--radius) - 2px);
      font-family: var(--font-display); font-weight: 600; font-size: 14px;
      background: transparent; color: var(--muted);
      transition: var(--transition); letter-spacing: 0.2px;
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      box-shadow: 0 1px 8px rgba(0,0,0,.4);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-family: var(--font-display); font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-title .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px; text-transform: uppercase;
      letter-spacing: .8px;
    }
    .url-row { display: flex; gap: 10px; }
    input[type="text"], input[type="url"], select {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font-mono); font-size: 13px;
      transition: border-color var(--transition);
      outline: none;
    }
    input[type="text"]:focus, input[type="url"]:focus, select:focus {
      border-color: var(--accent2);
    }
    select { cursor: pointer; -webkit-appearance: none; }

    .btn-primary {
      padding: 11px 24px; border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: var(--bg);
      font-family: var(--font-display); font-weight: 700; font-size: 14px;
      cursor: pointer; white-space: nowrap;
      transition: var(--transition); letter-spacing: 0.3px;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .loader-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 48px 0; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-steps { font-size: 13px; text-align: center; }
    .loader-step { opacity: 0; animation: fadeStep 0.5s ease forwards; }
    @keyframes fadeStep { to { opacity: 1; } }
    .error-banner {
      background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
      border-radius: var(--radius-sm); padding: 14px 16px;
      color: var(--danger); font-size: 14px; margin-bottom: 20px;
      display: none; animation: fadeUp .25s ease;
    }
    .article-hero {
      background: linear-gradient(135deg, var(--surface2) 0%, rgba(74,222,128,.05) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; margin-bottom: 20px;
    }
    .article-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: 22px; margin-bottom: 8px;
      background: linear-gradient(90deg, var(--text), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .article-url {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); margin-bottom: 14px;
      word-break: break-all;
    }
    .article-summary { color: #b0bacf; font-size: 14px; line-height: 1.7; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .tag {
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid;
    }
    .tag-person  { background: rgba(96,165,250,.12); border-color: rgba(96,165,250,.35); color: var(--accent2); }
    .tag-org     { background: rgba(251,191,36,.1);  border-color: rgba(251,191,36,.3);  color: #fbbf24; }
    .tag-loc     { background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.3); color: #a78bfa; }
    .tag-topic   { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.3);  color: var(--accent); }
    .tag-section { background: var(--surface2); border-color: var(--border); color: var(--muted); font-family: var(--font-mono); font-size: 11px; }
    
    .quiz-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .quiz-header h2 {
      font-family: var(--font-display); font-weight: 700; font-size: 16px;
    }
    .mode-toggle {
      display: flex; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 3px;
    }
    .mode-btn {
      padding: 5px 12px; border: none; border-radius: calc(var(--radius-sm) - 2px);
      font-family: var(--font-display); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: .5px; cursor: pointer;
      background: transparent; color: var(--muted);
      transition: var(--transition);
    }
    .mode-btn.active { background: var(--accent); color: var(--bg); }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
      transition: border-color var(--transition);
    }
    .question-card:hover { border-color: var(--surface2); }
    .question-top {
      display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px;
    }
    .q-num {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: grid; place-items: center;
      font-family: var(--font-display); font-weight: 700; font-size: 12px;
      color: var(--muted);
    }
    .q-text { font-weight: 500; font-size: 15px; flex: 1; padding-top: 4px; }
    .diff-badge {
      flex-shrink: 0; padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; font-family: var(--font-mono);
    }
    .diff-easy   { background: rgba(74,222,128,.15); color: var(--accent); }
    .diff-medium { background: rgba(251,191,36,.12);  color: #fbbf24; }
    .diff-hard   { background: rgba(248,113,113,.12); color: var(--danger); }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 560px) { .options { grid-template-columns: 1fr; } }

    .option-btn {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 14px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface2);
      cursor: pointer; text-align: left; transition: var(--transition);
      font-family: var(--font-body); font-size: 14px; color: var(--text);
    }
    .option-btn:hover { border-color: var(--accent2); }
    .option-btn.selected { border-color: var(--accent2); background: rgba(96,165,250,.1); }
    .option-btn.correct  { border-color: var(--accent); background: rgba(74,222,128,.12); }
    .option-btn.wrong    { border-color: var(--danger); background: rgba(248,113,113,.1); }
    .option-key {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
      background: var(--border); display: grid; place-items: center;
      font-weight: 700; font-size: 11px; font-family: var(--font-mono);
      margin-top: 1px;
    }
    .option-btn.correct .option-key { background: var(--accent); color: var(--bg); }
    .option-btn.wrong   .option-key { background: var(--danger); color: #fff; }

    .explanation {
      margin-top: 12px; padding: 10px 14px;
      background: rgba(74,222,128,.06); border-left: 2px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13px; color: #90b8a0; display: none;
    }
    .explanation.visible { display: block; animation: fadeUp .2s ease; }

    /* Take-quiz mode */
    .take-quiz-submit {
      display: none; margin-top: 20px;
      width: 100%; padding: 14px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-display); font-weight: 800; font-size: 15px;
      cursor: pointer; transition: var(--transition);
    }
    .take-quiz-submit:hover { filter: brightness(1.1); }
    .score-banner {
      text-align: center; padding: 20px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, rgba(74,222,128,.1), rgba(96,165,250,.08));
      border: 1px solid rgba(74,222,128,.25); border-radius: var(--radius);
      margin-bottom: 16px; display: none;
    }
    .score-banner .big-score { font-size: 40px; font-weight: 800; color: var(--accent); }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 12px 16px; text-align: left;
      font-family: var(--font-display); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    }
    td { padding: 13px 16px; font-size: 14px; border-top: 1px solid var(--border); }
    tr:hover td { background: var(--surface2); }
    .td-title { font-weight: 500; max-width: 280px; }
    .td-url { font-family: var(--font-mono); font-size: 11px; color: var(--muted); max-width: 200px; }
    .td-url a { color: var(--accent2); text-decoration: none; }
    .td-url a:hover { text-decoration: underline; }
    .td-date { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .btn-detail {
      padding: 5px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--accent2); background: transparent;
      color: var(--accent2); font-family: var(--font-display); font-weight: 600;
      font-size: 12px; cursor: pointer; transition: var(--transition);
    }
    .btn-detail:hover { background: rgba(96,165,250,.12); }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      overflow-y: auto; padding: 32px 16px;
    }
    .modal-overlay.open { display: block; animation: fadeOverlay .2s ease; }
    @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); max-width: 820px; margin: 0 auto;
      padding: 28px; position: relative;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface2);
      cursor: pointer; display: grid; place-items: center;
      font-size: 18px; color: var(--muted); transition: var(--transition);
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .section-label {
      font-family: var(--font-display); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
      margin: 20px 0 8px;
    }

    #result-area, #modal-result { display: none; }
    #result-area.visible, #modal-result.visible { display: block; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-mark">W</div>
    <div class="header-text">
      <h1>WikiQuiz</h1>
      <p>AI-powered quiz generation from Wikipedia articles</p>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('generate')">⚡ Generate Quiz</button>
    <button class="tab-btn" onclick="switchTab('history')">🕘 Past Quizzes</button>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════
       TAB 1 – GENERATE QUIZ
  ════════════════════════════════════════════════════════════════════ -->
  <div id="tab-generate" class="panel active">

    <!-- URL input card -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>Wikipedia Article URL</div>
      <div class="form-group">
        <label>Paste any Wikipedia URL</label>
        <div class="url-row">
          <input type="url" id="wiki-url"
            placeholder="https://en.wikipedia.org/wiki/Alan_Turing"
            autocomplete="off" spellcheck="false" />
          <select id="num-q" style="width:auto;min-width:130px">
            <option value="5">5 questions</option>
            <option value="7" selected>7 questions</option>
            <option value="10">10 questions</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="generate-btn" onclick="handleGenerate()">
        Generate Quiz →
      </button>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Loader -->
    <div class="loader-wrap" id="loader" style="display:none">
      <div class="spinner"></div>
      <div class="loader-steps" id="loader-steps">
        <div class="loader-step">🌐 Fetching Wikipedia article…</div>
      </div>
    </div>

    <!-- Result -->
    <div id="result-area">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════════
       TAB 2 – PAST QUIZZES
  ════════════════════════════════════════════════════════════════════ -->
  <div id="tab-history" class="panel">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div class="card-title" style="margin:0"><span class="dot"></span>Quiz History</div>
        <button class="btn-primary" style="font-size:12px;padding:7px 14px" onclick="loadHistory()">↺ Refresh</button>
      </div>
      <div id="history-body">
        <div class="empty-state"><div class="emoji">📚</div>Loading history…</div>
      </div>
    </div>
  </div>

</div><!-- /.app -->


<!-- ── Modal ──────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-result"></div>
  </div>
</div>


<script>

const API_BASE = 'http://localhost:8000/api';
let quizMode = 'view';  // 'view' | 'take'
let selectedAnswers = {};  // questionIndex -> optionKey
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (tab === 'generate' ? 0 : 1) === i)
  );
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
}
async function handleGenerate() {
  const url = document.getElementById('wiki-url').value.trim();
  const numQ = parseInt(document.getElementById('num-q').value);

  hideError();
  if (!url) { showError('Please enter a Wikipedia URL.'); return; }
  if (!url.includes('wikipedia.org/wiki/')) {
    showError('URL must be a Wikipedia article URL (e.g. https://en.wikipedia.org/wiki/Alan_Turing)');
    return;
  }

  setLoading(true);
  document.getElementById('result-area').classList.remove('visible');

  try {
    // Animate loader steps
    showLoaderStep('🌐 Fetching Wikipedia article…', 0);
    await delay(900);
    showLoaderStep('🧩 Extracting key entities and sections…', 700);
    await delay(700);
    showLoaderStep('🤖 Generating quiz with Gemini AI…', 1400);

    const res = await fetch(`${API_BASE}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, num_questions: numQ }),
    });

    showLoaderStep('💾 Saving to database…', 2000);
    await delay(400);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    setLoading(false);

    quizMode = 'view';
    selectedAnswers = {};
    renderResult(data, document.getElementById('result-area'), false);
    document.getElementById('result-area').classList.add('visible');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    setLoading(false);
    showError(err.message);
  }
}

function renderResult(data, container, isModal) {
  const ke = data.key_entities || {};
  const people = (ke.people || []).map(p => `<span class="tag tag-person">${esc(p)}</span>`).join('');
  const orgs   = (ke.organizations || []).map(o => `<span class="tag tag-org">${esc(o)}</span>`).join('');
  const locs   = (ke.locations || []).map(l => `<span class="tag tag-loc">${esc(l)}</span>`).join('');
  const topics = (data.related_topics || []).map(t => `<span class="tag tag-topic">${esc(t)}</span>`).join('');
  const secs   = (data.sections || []).slice(0, 8).map(s => `<span class="tag tag-section">${esc(s)}</span>`).join('');

  const prefix = isModal ? 'modal' : 'main';

  container.innerHTML = `
    <div class="article-hero">
      <div class="article-title">${esc(data.title)}</div>
      <div class="article-url">
        <a href="${esc(data.url)}" target="_blank" rel="noopener"
           style="color:var(--accent2);text-decoration:none">${esc(data.url)}</a>
      </div>
      <div class="article-summary">${esc(data.summary)}</div>
      ${people || orgs || locs ? `<div class="tag-row">${people}${orgs}${locs}</div>` : ''}
    </div>

    ${secs ? `
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--muted)"></span>Article Sections</div>
      <div class="tag-row">${secs}</div>
    </div>` : ''}

    <div class="card" style="padding-bottom:0">
      <div class="quiz-header">
        <h2>Quiz — ${data.quiz.length} Questions</h2>
        <div class="mode-toggle">
          <button class="mode-btn active" id="${prefix}-mode-view"
            onclick="setMode('view','${prefix}')">View</button>
          <button class="mode-btn" id="${prefix}-mode-take"
            onclick="setMode('take','${prefix}')">Take Quiz</button>
        </div>
      </div>
      <div id="${prefix}-score-banner" class="score-banner"></div>
      <div id="${prefix}-questions"></div>
      <button class="take-quiz-submit" id="${prefix}-submit-btn"
        onclick="submitQuiz('${prefix}')">Submit Answers →</button>
      <div style="height:8px"></div>
    </div>

    ${topics ? `
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Related Topics</div>
      <div class="tag-row">${topics}</div>
    </div>` : ''}
  `;

  renderQuestions(data.quiz, prefix, 'view');
  window[`${prefix}_quizData`] = data.quiz;
}

function renderQuestions(questions, prefix, mode) {
  const container = document.getElementById(`${prefix}-questions`);
  container.innerHTML = questions.map((q, i) => {
    const opts = ['A','B','C','D'].map(k => `
      <button class="option-btn" id="${prefix}-opt-${i}-${k}"
        onclick="selectOption(${i},'${k}','${prefix}')">
        <span class="option-key">${k}</span>
        <span>${esc(q.options[k] || '')}</span>
      </button>`).join('');
    return `
      <div class="question-card">
        <div class="question-top">
          <div class="q-num">${i+1}</div>
          <div class="q-text">${esc(q.question)}</div>
          <div class="diff-badge diff-${q.difficulty}">${q.difficulty}</div>
        </div>
        <div class="options">${opts}</div>
        <div class="explanation ${mode === 'view' ? 'visible' : ''}" id="${prefix}-exp-${i}">
          ✅ <strong>${q.answer}</strong> — ${esc(q.explanation)}
        </div>
      </div>`;
  }).join('');
}

function setMode(mode, prefix) {
  quizMode = mode;
  selectedAnswers = {};
  document.getElementById(`${prefix}-mode-view`).classList.toggle('active', mode === 'view');
  document.getElementById(`${prefix}-mode-take`).classList.toggle('active', mode === 'take');
  document.getElementById(`${prefix}-submit-btn`).style.display = mode === 'take' ? 'block' : 'none';
  document.getElementById(`${prefix}-score-banner`).style.display = 'none';

  const qData = window[`${prefix}_quizData`] || [];
  renderQuestions(qData, prefix, mode);

  // Reset option button state
  qData.forEach((q, i) => {
    ['A','B','C','D'].forEach(k => {
      const btn = document.getElementById(`${prefix}-opt-${i}-${k}`);
      if (btn) { btn.className = 'option-btn'; btn.disabled = false; }
    });
    const exp = document.getElementById(`${prefix}-exp-${i}`);
    if (exp) exp.className = `explanation ${mode === 'view' ? 'visible' : ''}`;
  });
}

function selectOption(qIdx, key, prefix) {
  if (quizMode === 'view') return;
  // Deselect others
  ['A','B','C','D'].forEach(k => {
    const btn = document.getElementById(`${prefix}-opt-${qIdx}-${k}`);
    if (btn) btn.classList.remove('selected');
  });
  selectedAnswers[qIdx] = key;
  const chosen = document.getElementById(`${prefix}-opt-${qIdx}-${key}`);
  if (chosen) chosen.classList.add('selected');
}


function submitQuiz(prefix) {
  const questions = window[`${prefix}_quizData`] || [];
  let correct = 0;
  questions.forEach((q, i) => {
    const chosen = selectedAnswers[i];
    ['A','B','C','D'].forEach(k => {
      const btn = document.getElementById(`${prefix}-opt-${i}-${k}`);
      if (!btn) return;
      btn.disabled = true;
      if (k === q.answer) btn.classList.add('correct');
      else if (k === chosen && k !== q.answer) btn.classList.add('wrong');
    });
    const exp = document.getElementById(`${prefix}-exp-${i}`);
    if (exp) exp.classList.add('visible');
    if (chosen === q.answer) correct++;
  });

  const pct = Math.round((correct / questions.length) * 100);
  const banner = document.getElementById(`${prefix}-score-banner`);
  banner.innerHTML = `
    <div class="big-score">${pct}%</div>
    <div>${correct} / ${questions.length} correct</div>
    <div style="color:var(--muted);font-size:13px;font-weight:400;margin-top:4px">
      ${pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good effort!' : '📖 Keep studying!'}
    </div>`;
  banner.style.display = 'block';
  document.getElementById(`${prefix}-submit-btn`).style.display = 'none';
}

  try {

    const items = await res.json();

    if (!items.length) {
      body.innerHTML = '<div class="empty-state"><div class="emoji">📭</div>No quizzes yet. Generate your first one!</div>';

                <td class="td-title">${esc(item.title)}</td>

  }
}
async function openModal(articleId) {
  const overlay = document.getElementById('modal-overlay');
  const result  = document.getElementById('modal-result');
  result.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><p style="color:var(--muted)">Loading quiz…</p></div>';
  result.classList.remove('visible');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(`${API_BASE}/quizzes/${articleId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    result.classList.add('visible');
    renderResult(data, result, true);
  } catch (err) {
    result.innerHTML = `<div style="color:var(--danger);padding:20px">⚠ ${esc(err.message)}</div>`;
    result.classList.add('visible');
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
  document.getElementById('generate-btn').disabled = on;
  document.getElementById('generate-btn').textContent = on ? 'Generating…' : 'Generate Quiz →';
}

const loaderMessages = [
  '🌐 Fetching Wikipedia article…',
  '🧩 Extracting entities and sections…',
  '🤖 Generating quiz with Gemini AI…',
  '💾 Saving to database…',
];

function showLoaderStep(msg, delayMs) {
  const container = document.getElementById('loader-steps');
  setTimeout(() => {
    container.innerHTML = `<div class="loader-step">${msg}</div>`;
  }, delayMs);
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function shortUrl(url) {
  try {
    const u = new URL(url);
    return u.pathname.replace('/wiki/', '');
  } catch { return url; }
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
document.getElementById('wiki-url').addEventListener('keydown', e => {

});
